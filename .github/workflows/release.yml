name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX v7
        run: |
          dotnet tool install --global wix --version 7.0.2
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Util.wixext

      # ── Framework-dependent build ──────────────────────────────────
      - name: Publish ClaudeMonitor (framework-dependent)
        run: dotnet publish ClaudeMonitor/ClaudeMonitor.csproj -r win-x64 -c Release

      - name: Publish HookProxy (framework-dependent)
        run: dotnet publish ClaudeMonitor.HookProxy/ClaudeMonitor.HookProxy.csproj -r win-x64 -c Release

      - name: Build MSI (framework-dependent)
        run: |
          Copy-Item "Installer/License.rtf" "License.rtf" -Force
          wix build `
            -arch x64 `
            -d "PublishDir=ClaudeMonitor/bin/Release/net8.0-windows/win-x64/publish/" `
            -d "HookProxyPublishDir=ClaudeMonitor.HookProxy/bin/Release/net8.0-windows/win-x64/publish/" `
            -d "HooksDir=ClaudeMonitor/Hooks/" `
            -d "SourceDir=ClaudeMonitor/" `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -out "CC-Pulse-x64.msi" `
            Installer/CC-Pulse.wxs

      # ── Self-contained build ───────────────────────────────────────
      - name: Publish ClaudeMonitor (self-contained)
        run: dotnet publish ClaudeMonitor/ClaudeMonitor.csproj -r win-x64 -c Release -p:SelfContained=true -p:TrimMode=partial

      - name: Publish HookProxy (self-contained)
        run: dotnet publish ClaudeMonitor.HookProxy/ClaudeMonitor.HookProxy.csproj -r win-x64 -c Release -p:SelfContained=true

      - name: Build MSI (self-contained)
        run: |
          Copy-Item "Installer/License.rtf" "License.rtf" -Force
          wix build `
            -arch x64 `
            -d "PublishDir=ClaudeMonitor/bin/Release/net8.0-windows/win-x64/publish/" `
            -d "HookProxyPublishDir=ClaudeMonitor.HookProxy/bin/Release/net8.0-windows/win-x64/publish/" `
            -d "HooksDir=ClaudeMonitor/Hooks/" `
            -d "SourceDir=ClaudeMonitor/" `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -out "CC-Pulse-x64-standalone.msi" `
            Installer/CC-Pulse.wxs

      # ── Create GitHub Release ──────────────────────────────────────
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CC-Pulse-x64.msi
            CC-Pulse-x64-standalone.msi
